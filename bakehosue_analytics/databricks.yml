# This is a Databricks asset bundle definition for bakehosue_analytics.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: bakehosue_analytics
  uuid: 48af9ba3-3bd2-4d53-b3a0-6da125f067ee

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    # mode: development
    presets:
      name_prefix: dev_

    default: true
    workspace:
      host: https://dbc-3f1c04d0-60d3.cloud.databricks.com
    variables:
      catalog: bakehouse_analytics_dev
      schema: rnd
  prod:
    mode: production
    presets:
      name_prefix: prod_
    workspace:
      host: https://dbc-3f1c04d0-60d3.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/databeli14@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/databeli14@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: bakehouse_analytics_prod
      schema: rnd
    permissions:
      - user_name: databeli14@gmail.com
        level: CAN_MANAGE
